<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medicine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">PharmaAlert</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/medicines">All Medicines</a></li>
                <li class="nav-item"><a class="nav-link active" href="/add-medicine">Add Medicine</a></li>
                <li class="nav-item"><a class="nav-link" href="/alerts">Alerts</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1>Add New Medicine</h1>
            <form method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Medicine Name *</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" name="category" placeholder="e.g., Antibiotic">
                </div>
                <div class="mb-3">
                    <label for="low_stock_threshold" class="form-label">Low Stock Threshold (units)</label>
                    <input type="number" class="form-control" id="low_stock_threshold" name="low_stock_threshold" value="50">
                </div>
                <button type="submit" class="btn btn-primary">Add Medicine</button>
                <a href="/medicines" class="btn btn-secondary">Cancel</a>
            </form>
            {% if message %}
            <div class="alert alert-info mt-3">{{ message }}</div>
            {% endif %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
