<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Operations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">PharmaAlert</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1>{{ operation | capitalize }} Stock</h1>
            <p class="text-muted">Medicine: <strong>{{ medicine_name }}</strong></p>
            <p class="text-muted">Batch: <strong>{{ batch_number }}</strong></p>
            <p class="text-muted">Current Quantity: <strong>{{ current_quantity }}</strong></p>

            <form method="POST">
                <div class="mb-3">
                    <label for="quantity" class="form-label">Quantity *</label>
                    <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
                </div>
                <div class="mb-3">
                    <label for="reason" class="form-label">Reason</label>
                    <input type="text" class="form-control" id="reason" name="reason" placeholder="e.g., Stock received from vendor">
                </div>
                <button type="submit" class="btn btn-primary">{{ operation | capitalize }}</button>
                <a href="/medicine/{{ medicine_id }}" class="btn btn-secondary">Cancel</a>
            </form>
            {% if message %}
            <div class="alert alert-info mt-3">{{ message }}</div>
            {% endif %}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
